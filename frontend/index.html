<!DOCTYPE html>
<html>
    <head>
        <title>TASK MANAGER</title>
        <link rel="stylesheet" href="style.css">
        <script src="script.js" defer></script>
        <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>
    <body>
        <div id="container">
            <div id="heading">
                <h1 id ="app-title">TASK MANAGER</h1>
                <p id="app-subtitle">Keep track of what matters</p>
            </div>
            <section id="auth-section">
                <p id="auth-title">AUTHENTICATION</p>
                <div id="auth-container">
                    <span id="jwt-badge">JWT</span>
                    <div id="auth-input-wrapper">
                        <input type="password" id="add-auth-input" placeholder="Enter JWT Token">
                        <button id="show-button"> 
                            <i class="fa-regular fa-eye" id="show-icon"></i>
                        </button>
                    </div>
                    
                </div>
                
                <p id="auth-disclaimer">Bearer token used to authenticate your requests</p>

            </section>
            <section id="input-section">
                <div id="input-card">
                    <label id="new-task-label" for="add-task-input">NEW TASK </label>
                    <input type="text" id="add-task-input" name="enter-task" placeholder="Title">
        
                    <textarea type="text" id="add-description" name="enter-description" placeholder="Description (optional)"></textarea>
                    <button id="add-task-button">Add Task</button>
                </div>
            </section>

            <section id="task-section">
            
                 <p id="active-label">ACTIVE TASKS</p>
                <div id="task-list-container">
                   
                  
                </div>

                <p id="completed-label">COMPLETED TASKS</p>
                <div id="task-completed-container">
                   
                   
                </div>
            </section>
        </div>
        
    </body>
   
</html>
